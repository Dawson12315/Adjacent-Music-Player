version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: spotify-replica-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - /Volumes/media/music:/music:ro
    environment:
      - MUSIC_LIBRARY_PATH=/music
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:8000
    container_name: spotify-replica-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped