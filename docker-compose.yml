version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: adjacent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ${MUSIC_LIBRARY_PATH_HOST}:/music:ro
    environment:
      - MUSIC_LIBRARY_PATH=/music
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - MUSICBRAINZ_EMAIL=${MUSICBRAINZ_EMAIL}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: adjacent-frontend
    ports:
      - "5173:80"
    environment:
      - API_BASE_URL=${API_BASE_URL}
    depends_on:
      - backend
    restart: unless-stopped