version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: adjacent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - /Volumes/media/music:/music:ro
    environment:
      - MUSIC_LIBRARY_PATH=/music
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: adjacent-frontend
    ports:
      - "5173:80"
    environment:
      - API_BASE_URL=http://192.168.86.23:8000
      - FRONTEND_ORIGIN=http://192.168.86.23:5173
    depends_on:
      - backend
    restart: unless-stopped